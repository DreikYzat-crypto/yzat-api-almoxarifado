<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YZAT - Usuários</title>

<link rel="stylesheet" href="css/style.css">

<style>
.card{
    max-width:700px;
    margin:30px auto;
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

.card h2{
    text-align:center;
    color:#2ea8ff;
    margin-bottom:20px;
}

.card input,
.card select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#2b3748;
    color:white;
    font-size:16px;
}

.card button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1fa2ff;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>👥 Cadastro de Usuários</h2>

<input id="nome" placeholder="Nome">

<input id="usuario" placeholder="Usuário">

<input id="senha" type="password" placeholder="Senha">

<select id="cargo">

<option value="almoxarife">Almoxarife</option>

<option value="supervisor">Supervisor</option>

<option value="admin">Administrador</option>

</select>

<button onclick="criarUsuario()">

Cadastrar Usuário

</button>

<p id="msg"></p>

</div>

<script src="js/usuarios.js"></script>

</body>

</html>
